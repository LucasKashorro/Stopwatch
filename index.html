<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch</title>
    <script src="./script.js" defer></script>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="conteiner">
        <div id="display">
            <p id="min-display" class="num-display">00</p>
            <p class="num-display">:</p>
            <p id="sec-display" class="num-display">00</p>
        </div>
        <div id="btn-conteiner">
            <button onclick="button('play')" class="btns" id="play-btn"><p id="play">▶</p></button>
            <button onclick="button('pause')" class="btns" id="pause-btn"><svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" fill="currentColor" class="bi bi-pause" viewBox="0 0 16 16">
                <path d="M6 3.5a.5.5 0 0 1 .5.5v8a.5.5 0 0 1-1 0V4a.5.5 0 0 1 .5-.5zm4 0a.5.5 0 0 1 .5.5v8a.5.5 0 0 1-1 0V4a.5.5 0 0 1 .5-.5z"/>
              </svg></button>
        </div>
    </div>
</body>
</html>
